name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  sdist:
    permissions:
      contents: read

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: "recursive"

      - name: Build source distribution (sdist)
        run: pipx run build --sdist

      - name: Upload source distribution as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-sdist
          path: dist

  wheel:
    runs-on: ubuntu-latest

    # We no longer need the Python matrix here!
    # cibuildwheel automatically loops through 3.8-3.14 based on your pyproject.toml

    permissions:
      contents: read

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Install Latest Git
        run: |
          sudo add-apt-repository ppa:git-core/ppa -y
          sudo apt-get update
          sudo apt-get install git -y

      - name: Check Git version
        run: git --version

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: "recursive"

      - name: Build wheels via cibuildwheel
        uses: pypa/cibuildwheel@v3.4.0
        with:
          output-dir: dist

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-wheels
          path: dist/*.whl

  install_wheel:
    needs: [wheel]

    permissions:
      contents: read

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show downloaded artifacts
        run: ls -lcahFR --color=auto dist

      - name: Check Python version
        run: |
          name=$(python -c 'import sys; print(f"cp{sys.version_info.major}{sys.version_info.minor}")')
          echo "PY_TAG=$name" >> "$GITHUB_ENV"
          echo "PY_TAG is set to '${name}'."

      - name: Install wheel
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install dist/*${PY_TAG}-*.whl
        env:
          PY_TAG: ${{ env.PY_TAG }}

      - name: Determine package name
        run: |
          name=$(echo "${REPO_NAME}" | tr '-' '_')
          echo "PKG_NAME=$name" >> "$GITHUB_ENV"
          echo "PKG_NAME is set to '${name}'."
        env:
          REPO_NAME: ${{ github.event.repository.name }}

      - name: Test import
        run: python -c "import ${PKG_NAME}; print(${PKG_NAME}.__version__)"
        env:
          PKG_NAME: ${{ env.PKG_NAME }}

  upload_test_pypi:
    needs: [sdist, wheel]

    runs-on: ubuntu-latest

    environment: release

    permissions:
      contents: read
      id-token: write

    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
        with:
          repository-url: https://test.pypi.org/legacy/

  upload_pypi:
    needs: [sdist, wheel, upload_test_pypi]

    runs-on: ubuntu-latest

    environment: release

    permissions:
      contents: read
      id-token: write

    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4

  upload_github_release_assets:
    needs: [sdist, wheel, install_wheel]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
